<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>pimpmypaint 3.2</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.1.2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.6.1/p5.min.js"></script>
  <script src="./utils.js"></script>
  <script src="./pix2pix.js"></script>

  <style>
    :root { --win-bg: #008080; --win-gray: #c0c0c0; --win-blue: #000080; --win-light: #ffffff; --win-shadow: #808080; }
    * { user-select: none; -webkit-user-drag: none; cursor: default; }
    body { background: var(--win-bg); font-family: "MS Sans Serif", Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; touch-action: none; }
    .window { background: var(--win-gray); border: 2px solid; border-color: var(--win-light) var(--win-shadow) var(--win-shadow) var(--win-light); width: 95vw; max-width: 940px; padding: 2px; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
    .title-bar { background: var(--win-blue); color: white; padding: 3px 6px; font-weight: bold; font-size: 13px; }
    .toolbar-main { display: flex; align-items: center; gap: 8px; padding: 8px; border-bottom: 2px solid var(--win-shadow); background: #d6d6d6; flex-wrap: wrap; }
    .color-palette { display: flex; gap: 2px; border: 2px inset white; padding: 2px; background: #999; }
    .color-column { display: flex; flex-direction: column; gap: 2px; }
    .color-swatch { width: 22px; height: 22px; border: 2px solid; border-color: var(--win-light) var(--win-shadow) var(--win-shadow) var(--win-light); cursor: pointer; }
    .color-swatch.active { border-color: black; outline: 1px solid white; }
    .tool-group { display: flex; border: 2px inset white; padding: 2px; gap: 2px; background: var(--win-gray); }
    .tool-btn { width: 34px; height: 34px; border: 2px solid; border-color: var(--win-light) var(--win-shadow) var(--win-shadow) var(--win-light); background: var(--win-gray); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .tool-btn.active { border-color: var(--win-shadow) var(--win-light) var(--win-light) var(--win-shadow); background: #e0e0e0; }
    .control-panel { display: flex; align-items: center; gap: 5px; border: 1px inset white; padding: 4px; background: var(--win-gray); font-size: 10px; }
    .control-panel input[type="number"] { width: 35px; }
    .workspace { display: flex; gap: 10px; padding: 10px; justify-content: center; }
    @media (max-width: 600px) {
      .workspace { flex-direction: column; align-items: center; padding: 5px; }
      .window { width: 98vw; }
      .toolbar-main { justify-content: center; }
    }
    .sub-window { background: var(--win-gray); border: 2px solid; border-color: var(--win-light) var(--win-shadow) var(--win-shadow) var(--win-light); width: 266px; }
    .sub-title { background: #808080; color: white; font-size: 11px; padding: 2px 5px; font-weight: bold; }
    #canvasContainer, #output { width: 256px; height: 256px; background: white; border: 2px inset white; margin: 3px auto; overflow: hidden; position: relative;}
    #output img { width: 256px; height: 256px; }
    .status-bar { border-top: 1px solid var(--win-shadow); padding: 2px 5px; font-size: 11px; display: flex; justify-content: flex-end; height: 16px; }
    button.win98-btn { padding: 4px 8px; font-family: "MS Sans Serif"; font-size: 11px; background: var(--win-gray); border: 2px solid; border-color: white #808080 #808080 white; cursor: pointer; touch-action: manipulation; }
    .music-btn { background: #ff00ff !important; color: white; font-weight: bold; }
  </style>
</head>
<body>

<div class="window">
  <div class="title-bar"><span>pimpmypaint 3.2</span></div>

  <div class="toolbar-main">
    <div class="color-palette">
      <div class="color-column">
        <div class="color-swatch active" id="sw-black" onpointerdown="setColor('#000000', 'sw-black')" style="background:#000000"></div>
        <div class="color-swatch" id="sw-red" onpointerdown="setColor('#ff0000', 'sw-red')" style="background:#ff0000"></div>
      </div>
      <div class="color-column">
        <div class="color-swatch" id="sw-blue" onpointerdown="setColor('#0000ff', 'sw-blue')" style="background:#0000ff"></div>
        <div class="color-swatch" id="sw-green" onpointerdown="setColor('#00ff00', 'sw-green')" style="background:#00ff00"></div>
      </div>
      <div class="color-column"><div class="color-swatch" id="sw-white" onpointerdown="setColor('#ffffff', 'sw-white')" style="background:#ffffff"></div></div>
    </div>

    <div class="tool-group">
      <button class="tool-btn active" id="btn-rect" onpointerdown="setTool('rect')">⬜</button>
      <button class="tool-btn" id="btn-circle" onpointerdown="setTool('circle')">⚪</button>
      <button class="tool-btn" id="btn-triangle" onpointerdown="setTool('triangle')">▲</button>
      <button class="tool-btn" id="btn-brush" onpointerdown="setTool('brush')">🖌️</button>
      <button class="tool-btn" id="btn-eraser" onpointerdown="activateEraser()">🧹</button>
    </div>

    <div class="control-panel">
      <label>Grosor:</label>
      <input type="number" id="globalSize" value="3" min="1" max="25">
      <input type="checkbox" id="hasBorder" checked onclick="toggleBorder()">
      <input type="color" id="borderColor" value="#000000">
    </div>
    
    <div style="display:flex; gap:3px; flex-grow:1; justify-content: flex-end;">
        <button id="musicToggle" onpointerdown="toggleMusic(event)" class="win98-btn music-btn">🎵 OFF</button>
        <button onpointerdown="renderPikachu(event)" class="win98-btn" style="font-weight: bold; background: #ffff00 !important;">GO!</button>
        <button onpointerdown="clearCanvas()" class="win98-btn">CLR</button>
    </div>
  </div>

  <div class="workspace">
    <div class="sub-window"><div class="sub-title">Dibujo</div><div id="canvasContainer"></div></div>
    <div class="sub-window"><div class="sub-title">Salida</div><div id="output"></div></div>
  </div>

  <div class="status-bar"><span>v3.2</span></div>
</div>

<script>
  let edges2pikachu, modelReady = false;
  let currentColor = '#000000', currentTool = 'rect', shapes = [];
  let isDragging = false, startX, startY;
  const SIZE = 256;
  let globalHasBorder = true;

  // --- AUDIO FIX ---
  let audioCtx = null, isPlaying = false, masterGain = null; 
  const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];

  function toggleMusic(e) {
    if(e) e.preventDefault();
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0.1, audioCtx.currentTime); 
        masterGain.connect(audioCtx.destination);
    }
    audioCtx.resume().then(() => {
        isPlaying = !isPlaying;
        document.getElementById('musicToggle').innerText = isPlaying ? "🎵 ON" : "🎵 OFF";
        if (isPlaying) playBaseMelody();
    });
  }

  function playBaseMelody() {
    if (!isPlaying) return;
    let targetVol = isDragging ? 0.22 : 0.08;
    masterGain.gain.setTargetAtTime(targetVol, audioCtx.currentTime, 0.1);
    const freq = scale[Math.floor(Math.random() * scale.length)];
    triggerSynth(freq, 'triangle', 0.5, 0.4, true); 
    setTimeout(playBaseMelody, random([250, 500, 750])); 
  }

  function playDrawingNote() {
    if (!isPlaying || !audioCtx) return;
    const noteIdx = Math.floor(map(mouseY, SIZE, 0, 0, scale.length - 1));
    const freq = scale[noteIdx] * 2; 
    triggerSynth(freq, 'sine', 0.01, 0.1, false); 
  }

  function triggerSynth(freq, type, vol, duration, isBackground) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.connect(gain);
    if(isBackground) gain.connect(masterGain);
    else gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  // --- LÓGICA DE DIBUJO ---
  function setup() {
    const canvas = createCanvas(SIZE, SIZE);
    canvas.parent('canvasContainer');
    background(255);
    edges2pikachu = new Pix2pix('./models/edges2pikachu_AtoB.pict', () => { modelReady = true; });
  }

  function draw() {
    background(255);
    shapes.forEach(s => {
      if (s.t === 'brush') { noStroke(); fill(s.c); ellipse(s.x, s.y, s.w, s.h); }
      else if (s.t === 'eraser') { noStroke(); fill(255); rect(s.x, s.y, s.w, s.h); }
      else {
        if (s.hasB) { stroke(s.bc); strokeWeight(s.bw); } else { noStroke(); }
        fill(s.c);
        if (s.t === 'rect') rect(s.x, s.y, s.w, s.h);
        else if (s.t === 'circle') ellipse(s.x + s.w/2, s.y + s.h/2, s.w, s.h);
        else if (s.t === 'triangle') triangle(s.x + s.w/2, s.y, s.x, s.y + s.h, s.x + s.w, s.y + s.h);
      }
    });

    if (isDragging && currentTool !== 'brush' && currentTool !== 'eraser') {
      let sz = parseInt(document.getElementById('globalSize').value);
      if (globalHasBorder) { stroke(document.getElementById('borderColor').value); strokeWeight(sz); } else { noStroke(); }
      fill(currentColor);
      let w = mouseX - startX, h = mouseY - startY;
      if (currentTool === 'rect') rect(startX, startY, w, h);
      else if (currentTool === 'circle') ellipse(startX + w/2, startY + h/2, w, h);
      else if (currentTool === 'triangle') triangle(startX + w/2, startY, startX, startY + h, startX + w, startY + h);
    }
  }

  function addPoint() {
    let sz = parseInt(document.getElementById('globalSize').value);
    shapes.push({
      x: mouseX, y: mouseY, w: (currentTool === 'eraser' ? 20 : sz), h: (currentTool === 'eraser' ? 20 : sz), 
      c: (currentTool === 'eraser' ? '#ffffff' : currentColor), t: currentTool, hasB: false, bc: null, bw: 0
    });
    playDrawingNote();
  }

  function touchStarted() {
    if (mouseX > 0 && mouseX < SIZE && mouseY > 0 && mouseY < SIZE) {
      startX = mouseX; startY = mouseY; isDragging = true;
      if(currentTool === 'brush' || currentTool === 'eraser') addPoint();
      return false;
    }
  }

  function touchMoved() {
    if (isDragging) {
      if(currentTool === 'brush' || currentTool === 'eraser') addPoint();
      return false;
    }
  }

  function touchEnded() {
    if (isDragging) {
      if (currentTool !== 'brush' && currentTool !== 'eraser') { 
        shapes.push({
          x: startX, y: startY, w: mouseX - startX, h: mouseY - startY, 
          c: currentColor, t: currentTool, hasB: globalHasBorder, 
          bc: document.getElementById('borderColor').value, 
          bw: parseInt(document.getElementById('globalSize').value)
        }); 
        playDrawingNote(); 
      } 
      isDragging = false;
    }
  }

  function mousePressed() { touchStarted(); }
  function mouseDragged() { touchMoved(); }
  function mouseReleased() { touchEnded(); }

  function setColor(c, id) { currentColor = c; document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
  function setTool(t) { currentTool = t; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-' + t).classList.add('active'); }
  function toggleBorder() { globalHasBorder = document.getElementById('hasBorder').checked; }
  function activateEraser() { setTool('eraser'); }
  function clearCanvas() { shapes = []; document.getElementById('output').innerHTML = ''; }

  async function renderPikachu(e) {
    if(e) e.preventDefault();
    if (!modelReady) return;
    const tempCanvas = createGraphics(SIZE, SIZE);
    tempCanvas.background(255);
    shapes.forEach(s => {
      if (s.t === 'brush') { tempCanvas.noStroke(); tempCanvas.fill(s.c); tempCanvas.ellipse(s.x, s.y, s.w, s.h); }
      else if (s.t === 'eraser') { tempCanvas.noStroke(); tempCanvas.fill(255); tempCanvas.rect(s.x, s.y, s.w, s.h); }
      else { 
        if (s.hasB) { tempCanvas.stroke(s.bc); tempCanvas.strokeWeight(s.bw); } else { tempCanvas.noStroke(); } 
        tempCanvas.fill(s.c); 
        if (s.t === 'rect') tempCanvas.rect(s.x, s.y, s.w, s.h); 
        else if (s.t === 'circle') tempCanvas.ellipse(s.x + s.w/2, s.y + s.h/2, s.w, s.h); 
        else if (s.t === 'triangle') tempCanvas.triangle(s.x + s.w/2, s.y, s.x, s.y + s.h, s.x + s.w, s.y + s.h);
      }
    });
    edges2pikachu.transfer(tempCanvas.elt, (result) => { 
        document.getElementById('output').innerHTML = `<img src="${result.src}">`; 
        tempCanvas.remove(); 
    });
  }
</script>
</body>
</html>
