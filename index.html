<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; connect-src 'self' https://cdn.jsdelivr.net;">
  
  <title>pimpmypaint 3.2</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.1.2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.6.1/p5.min.js"></script>
  <script src="./utils.js"></script>
  <script src="./pix2pix.js"></script>

  <style>
    /* ... (Mismo estilo que antes) ... */
    :root { --win-bg: #008080; --win-gray: #c0c0c0; --win-blue: #000080; --win-light: #ffffff; --win-shadow: #808080; }
    * { user-select: none; -webkit-user-drag: none; touch-action: none; }
    body { background: var(--win-bg); font-family: "MS Sans Serif", Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .window { background: var(--win-gray); border: 2px solid; border-color: var(--win-light) var(--win-shadow) var(--win-shadow) var(--win-light); width: 940px; max-width: 98vw; padding: 2px; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
    .title-bar { background: var(--win-blue); color: white; padding: 3px 6px; font-weight: bold; font-size: 13px; }
    .toolbar-main { display: flex; align-items: center; gap: 8px; padding: 8px; border-bottom: 2px solid var(--win-shadow); background: #d6d6d6; flex-wrap: wrap; }
    .control-panel { display: flex; align-items: center; gap: 5px; border: 1px inset white; padding: 4px; background: var(--win-gray); font-size: 10px; }
    .workspace { display: flex; gap: 15px; padding: 15px; justify-content: center; flex-wrap: wrap; }
    .sub-window { background: var(--win-gray); border: 2px solid; border-color: var(--win-light) var(--win-shadow) var(--win-shadow) var(--win-light); width: 270px; }
    .sub-title { background: #808080; color: white; font-size: 11px; padding: 2px 5px; font-weight: bold; }
    #canvasContainer, #output { width: 256px; height: 256px; background: white; border: 2px inset white; margin: 5px auto; }
    button.win98-btn { padding: 4px 12px; font-family: "MS Sans Serif"; font-size: 11px; background: var(--win-gray); border: 2px solid; border-color: white #808080 #808080 white; cursor: pointer; }
    .music-btn { background: #ff00ff !important; color: white; font-weight: bold; }
  </style>
</head>
<body>

<div class="window">
  <div class="title-bar"><span>pimpmypaint 3.2</span></div>

  <div class="toolbar-main">
    <div class="control-panel">
      <label for="globalSize">Grosor:</label>
      <input type="number" id="globalSize" value="3" min="1" max="25">
      
      <label for="hasBorder">| Borde:</label>
      <input type="checkbox" id="hasBorder" checked onclick="toggleBorder()">
      <input type="color" id="borderColor" value="#000000" style="width:20px;height:20px;">
    </div>
    
    <div style="display:flex; gap:5px; margin-left: auto;">
        <button id="musicToggle" onclick="toggleMusic()" class="win98-btn music-btn">MUSIC: OFF</button>
        <button onclick="renderPikachu()" class="win98-btn" style="background: #ffff00 !important;">TRANSFORMAR!</button>
        <button onclick="clearCanvas()" class="win98-btn">LIMPIAR</button>
    </div>
  </div>

  <div class="workspace">
    <div class="sub-window"><div class="sub-title">Dibujo</div><div id="canvasContainer"></div></div>
    <div class="sub-window"><div class="sub-title">Salida</div><div id="output"></div></div>
  </div>
</div>

<script>
  // Aquí va toda tu lógica de p5.js y pix2pix que ya tenemos establecida.
  // Asegúrate de mantener las funciones touchStarted, touchMoved y touchEnded 
  // para que el dibujo fluya en el celular.
</script>
</body>
</html>
